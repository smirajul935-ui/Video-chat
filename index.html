<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T€ÄÇH̾ 𝐕𝚒dєσ🤍</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SweetAlert for nice popups -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Connection Sound -->
    <audio id="connect-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen active">
        <div class="glass-panel">
            <h1 class="app-title">T€ÄÇH̾ <span>𝐕𝚒dєσ🤍</span></h1>
            
            <div class="user-info">
                <p>Your Secret Code: <span id="my-code" class="highlight">Loading...</span></p>
                <button id="copy-code-btn" class="icon-btn"><i class="fas fa-copy"></i></button>
            </div>

            <div class="actions">
                <button id="btn-random" class="btn primary-btn pulse-glow">
                    <i class="fas fa-random"></i> Start Random Chat
                </button>

                <div class="divider"><span>OR</span></div>

                <div class="private-chat-box">
                    <input type="text" id="partner-code" placeholder="Enter 6-digit code" maxlength="6">
                    <button id="btn-private" class="btn secondary-btn">
                        <i class="fas fa-video"></i> Join Private Chat
                    </button>
                </div>
            </div>

            <!-- TELEGRAM BUTTON (Only on Home Screen) -->
            <a href="https://t.me/SagarTech99" target="_blank" class="telegram-btn">
                <i class="fab fa-telegram-plane"></i> Join Telegram Channel
            </a>
        </div>
    </div>

    <!-- VIDEO SCREEN -->
    <div id="video-screen" class="screen">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
            
            <div id="status-overlay" class="status-overlay">
                <div class="loader"></div>
                <p id="call-status">Searching for partner...</p>
            </div>

            <div class="controls-bar">
                <button id="btn-mute" class="control-btn"><i class="fas fa-microphone"></i></button>
                <button id="btn-camera" class="control-btn"><i class="fas fa-camera-rotate"></i></button>
                <button id="btn-skip" class="control-btn skip-btn"><i class="fas fa-forward"></i> Skip</button>
                <button id="btn-end" class="control-btn end-btn"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

    <!-- MAIN SCRIPTS -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="webrtc.js"></script>
    <script type="module" src="app.js"></script>

</body>
                                                                </html>
